# ═══════════════════════════════════════════════════════════
# 통합 CI — Lint · Test · Build
# ═══════════════════════════════════════════════════════════
#
# 구조:
#   1) rust      — Clippy + build + test  (Windows / Ubuntu)
#   2) js-tests  — Electron GUI (Vitest) + Discord Bot
#   3) build     — Release 빌드 + 아티팩트 업로드 (main push / tag 시)
#
# quick-test.yml: feature branch에서 JS 파일만 변경 시 경량 테스트
# release.yml:   릴리즈 패키징 & manifest 생성
# ═══════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────
  # 1. Rust — Clippy + Build + Test
  # ─────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Create test fixture module
        shell: bash
        run: |
          mkdir -p modules/test-module
          cat > modules/test-module/module.toml << 'EOF'
          [module]
          name = "test-module"
          version = "0.0.1"
          description = "CI test fixture"
          author = "ci"
          game_name = "TestGame"
          display_name = "Test Module"
          entry = "lifecycle.py"
          EOF
          # Strip leading whitespace from heredoc (YAML indentation artifact)
          sed -i 's/^[[:space:]]*//' modules/test-module/module.toml
          cat > modules/test-module/lifecycle.py << 'EOF'
          # minimal test lifecycle
          EOF
          sed -i 's/^[[:space:]]*//' modules/test-module/lifecycle.py

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  # ─────────────────────────────────────────
  # 2. JavaScript — GUI + Discord Bot
  # ─────────────────────────────────────────
  js-tests:
    name: JS Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            saba-chan-gui/package-lock.json
            discord_bot/package-lock.json

      - name: Install & Test — Electron GUI
        working-directory: saba-chan-gui
        run: |
          npm ci
          npx vitest run

      - name: Install & Test — Discord Bot
        working-directory: discord_bot
        run: |
          npm ci
          npm test
