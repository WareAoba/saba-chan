name: Release — Package & Manifest

# ─────────────────────────────────────────────────────────
# 릴리즈 파일 패키징 & manifest.json 자동 생성 워크플로우
#
# 부분 릴리즈 지원:
#   모든 컴포넌트를 매번 빌드할 필요 없음.
#   변경된 컴포넌트만 올리면 나머지는 이전 릴리즈에서 자동 수집.
#
# 사용법:
#   1. GitHub에서 Draft Release 생성 (태그: v0.x.x)
#   2. 변경된 컴포넌트만 빌드하여 릴리즈에 첨부:
#      - saba-core.exe / saba-core-*.zip
#      - saba-chan-cli.exe / saba-chan-cli-*.zip
#      - saba-chan-gui.exe / saba-chan-gui-*.zip
#      - saba-chan-updater.exe / saba-chan-updater-*.zip
#      - discord-bot.zip
#      (전부 올릴 필요 없음 — 빠진 것은 이전 릴리즈에서 가져옴)
#   3. Release 발행 → 이 액션이 자동 수행:
#      a) raw exe → 표준 이름의 zip으로 리패키징
#      b) 빠진 컴포넌트 → 이전 릴리즈에서 다운로드
#      c) locales/ → locales.zip 생성 (항상 최신 소스 반영)
#      d) SHA256 해시가 포함된 manifest.json 생성
#      e) 모든 결과물을 릴리즈에 업로드
#
# 최종 릴리즈 에셋 (매 릴리즈마다 완전체 보장):
#   saba-core-windows-x64.zip
#   saba-chan-cli-windows-x64.zip
#   saba-chan-gui-windows-x64.zip
#   saba-chan-updater-windows-x64.zip
#   discord-bot.zip
#   locales.zip
#   manifest.json
# ─────────────────────────────────────────────────────────

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package-and-manifest:
    name: Package assets & generate manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main  # 태그가 아닌 main의 최신 스크립트·소스를 사용

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download existing release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p staging
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --dir staging \
            --skip-existing || true
          echo "=== Downloaded assets ==="
          ls -la staging/

      - name: Package & generate manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_ID: ${{ github.event.release.id }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: python .github/scripts/package-release.py

      - name: Upload packaged assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Uploading to release ==="
          for f in output/*; do
            echo "  Uploading: $(basename $f)"
            gh release upload "${{ github.event.release.tag_name }}" \
              "$f" \
              --repo "${{ github.repository }}" \
              --clobber
          done
          echo "✓ All assets uploaded"

      - name: Clean up original raw assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Cleaning up raw assets ==="
          # output/ 에 있는 파일 이름 목록 = 유지할 에셋
          KEEP_FILES=$(ls output/ | sort)
          # 릴리즈의 현재 에셋 목록
          ALL_ASSETS=$(gh release view "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --json assets --jq '.assets[].name' | sort)
          # output/에 없는 에셋 삭제
          for asset in $ALL_ASSETS; do
            if ! echo "$KEEP_FILES" | grep -qx "$asset"; then
              echo "  Deleting: $asset"
              gh release delete-asset "${{ github.event.release.tag_name }}" \
                "$asset" \
                --repo "${{ github.repository }}" \
                --yes
            fi
          done
          echo "✓ Cleanup complete"
